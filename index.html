<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍳 干饭抽签转盘 · 今天吃啥终极解决器</title>

    <script>
        window._AMapSecurityConfig = {
            securityJsCode: 'b28f8a5d6786ff7e8feab84248668904'
        };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=4b2b62a68e2b2d6208d1ae6282ddae89&plugin=AMap.PlaceSearch,AMap.Geolocation,AMap.CitySearch,AMap.Geocoder">
    </script>

    <style>
        :root {
            --bg: #FFF9F2;
            --card: #FFFFFF;
            --primary: #FF6B35;
            --secondary: #FF8C42;
            --accent: #FFD166;
            --warm-red: #EF476F;
            --text: #4A3728;
            --text-light: #8B7355;
            --border: #F0E0D0;
            --shadow: 0 4px 20px rgba(255,107,53,0.12);
            --radius: 20px;
            --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(255,140,66,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,209,102,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255,107,53,0.03) 0%, transparent 70%);
            color: var(--text); min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 16px; -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }
        .app {
            width: 100%; max-width: 460px;
            display: flex; flex-direction: column; align-items: center;
            gap: 14px; padding-bottom: 40px;
        }

        /* ── Header ── */
        .header { text-align:center; padding-top:8px; }
        .header h1 {
            font-size:28px; font-weight:800;
            background: linear-gradient(135deg, #FF6B35, #EF476F, #FF8C42);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            letter-spacing:2px;
        }
        .header .subtitle { font-size:13px; color:var(--text-light); margin-top:2px; letter-spacing:1px; }

        /* ── Location Bar ── */
        .location-bar {
            width:100%; background:var(--card); border-radius:16px; padding:12px 18px;
            display:flex; align-items:center; gap:10px;
            box-shadow:var(--shadow); border:1.5px solid var(--border);
            transition:all 0.3s; min-height:48px;
        }
        .location-bar .loc-icon { font-size:20px; flex-shrink:0; }
        .location-bar .loc-text {
            flex:1; font-size:14px; font-weight:500; color:var(--text);
            min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }
        .location-bar .loc-input {
            flex:1; border:none; outline:none; font-size:14px; font-family:var(--font);
            color:var(--text); background:transparent;
            border-bottom:2px dashed var(--secondary); padding:4px 2px; transition:border-color 0.2s;
        }
        .location-bar .loc-input:focus { border-bottom-color:var(--primary); border-bottom-style:solid; }
        .location-bar .loc-btn {
            flex-shrink:0; border:none;
            background:linear-gradient(135deg, var(--secondary), var(--primary));
            color:#fff; font-size:13px; font-weight:600; padding:6px 14px;
            border-radius:20px; cursor:pointer; font-family:var(--font);
            transition:all 0.2s; letter-spacing:1px;
        }
        .location-bar .loc-btn:hover { transform:scale(1.04); box-shadow:0 2px 12px rgba(255,107,53,0.35); }
        .location-bar .loc-btn:active { transform:scale(0.96); }
        .location-bar .loc-edit-hint {
            font-size:12px; color:var(--secondary); cursor:pointer; font-weight:600;
            flex-shrink:0; transition:color 0.2s; background:none; border:none;
            font-family:var(--font); letter-spacing:1px;
        }
        .location-bar .loc-edit-hint:hover { color:var(--primary); }

        /* ── Stage Indicator (Step 2 only) ── */
        .stage-indicator { display:flex; gap:10px; align-items:center; }
        .stage-dot {
            width:34px; height:34px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:14px; font-weight:700; background:#F5EDE5; color:#C4B5A5;
            transition:all 0.4s;
        }
        .stage-dot.active {
            background:linear-gradient(135deg, var(--primary), var(--secondary));
            color:#fff; box-shadow:0 3px 14px rgba(255,107,53,0.35); transform:scale(1.1);
        }
        .stage-dot.done { background:#FFD166; color:#fff; }
        .stage-line { width:36px; height:2px; background:#E8DDD2; border-radius:1px; transition:background 0.4s; }
        .stage-line.done { background:var(--accent); }

        /* ════════════ Step 1: 品类挑选页 ════════════ */
        #step1 {
            width:100%; display:flex; flex-direction:column; align-items:center; gap:16px;
            animation: fadeSlideIn 0.45s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        #step1.hiding {
            animation: fadeSlideOut 0.3s ease forwards;
        }
        @keyframes fadeSlideOut {
            from { opacity:1; transform:translateY(0); }
            to   { opacity:0; transform:translateY(-20px); }
        }

        .pick-title {
            font-size:22px; font-weight:800; color:var(--text); text-align:center; letter-spacing:1px;
        }
        .pick-subtitle { font-size:13px; color:var(--text-light); text-align:center; margin-top:-6px; }

        .pick-card {
            width:100%; background:var(--card); border-radius:var(--radius); padding:18px 16px;
            box-shadow:0 8px 32px rgba(255,107,53,0.15); border:1.5px solid var(--border);
        }

        .cat-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
        .cat-chip { position:relative; cursor:pointer; }
        .cat-chip input[type="checkbox"] { position:absolute; opacity:0; pointer-events:none; }
        .cat-chip .chip-label {
            display:inline-block; padding:10px 18px; border-radius:25px;
            font-size:15px; font-weight:600; letter-spacing:1px;
            border:2px solid #E8DDD2; background:#FFF; color:#B0A090;
            transition:all 0.25s; font-family:var(--font);
        }
        .cat-chip input:checked + .chip-label {
            background:linear-gradient(135deg, #FFF5EE, #FFE8D6);
            border-color:var(--secondary); color:var(--primary);
            box-shadow:0 2px 12px rgba(255,140,66,0.22);
        }
        .cat-chip .chip-label:hover { border-color:var(--secondary); transform:translateY(-1px); }
        .cat-chip .chip-del {
            position:absolute; top:-6px; right:-6px;
            width:18px; height:18px; border-radius:50%;
            background:var(--warm-red); color:#fff;
            font-size:11px; line-height:18px; text-align:center;
            cursor:pointer; display:none; z-index:2;
            border:none; font-family:var(--font);
        }
        .cat-chip.custom .chip-del { display:block; }

        /* Custom input row */
        .custom-row {
            display:flex; gap:8px; margin-top:14px; padding-top:14px;
            border-top:1px dashed #E8DDD2; align-items:center; justify-content:center;
        }
        .custom-row .custom-icon { font-size:18px; }
        .custom-row input {
            flex:1; max-width:160px; border:2px dashed #E0D0C0; border-radius:20px;
            padding:8px 14px; font-size:14px; font-family:var(--font); color:var(--text);
            outline:none; background:#FFFAF5; transition:border-color 0.2s;
        }
        .custom-row input:focus { border-color:var(--secondary); border-style:solid; }
        .custom-row .btn-add-custom {
            border:none; background:linear-gradient(135deg, var(--accent), var(--secondary));
            color:#fff; font-size:13px; font-weight:700; padding:8px 16px;
            border-radius:20px; cursor:pointer; font-family:var(--font); letter-spacing:1px;
            transition:all 0.2s; white-space:nowrap;
        }
        .custom-row .btn-add-custom:hover { transform:scale(1.04); }
        .custom-row .btn-add-custom:active { transform:scale(0.96); }

        /* Generate button */
        .pick-footer { text-align:center; margin-top:4px; }
        .pick-counter { font-size:13px; color:var(--text-light); margin-bottom:10px; letter-spacing:1px; }
        .pick-counter.warn { color:var(--warm-red); font-weight:700; }
        .btn-generate {
            border:none; padding:14px 40px; border-radius:30px;
            font-size:18px; font-weight:800; cursor:pointer; font-family:var(--font);
            letter-spacing:2px; transition:all 0.3s;
            background:linear-gradient(135deg, var(--primary), var(--secondary));
            color:#fff; box-shadow:0 6px 24px rgba(255,107,53,0.35);
        }
        .btn-generate:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(255,107,53,0.5); }
        .btn-generate:active { transform:scale(0.96); }
        .btn-generate:disabled {
            opacity:0.4; cursor:not-allowed; pointer-events:none; transform:none;
        }

        /* ════════════ Step 2: 转盘抽签页 ════════════ */
        #step2 {
            width:100%; display:none; flex-direction:column; align-items:center; gap:14px;
            animation: fadeSlideIn 0.45s ease;
        }
        #step2.hiding {
            animation: fadeSlideOut 0.3s ease forwards;
        }

        /* ── Wheel ── */
        .wheel-container {
            position:relative; width:340px; height:340px; flex-shrink:0;
        }
        .wheel-pointer {
            position:absolute; top:-10px; left:50%; transform:translateX(-50%); z-index:10;
            width:0; height:0;
            border-left:16px solid transparent; border-right:16px solid transparent;
            border-top:30px solid var(--warm-red);
            filter:drop-shadow(0 3px 6px rgba(239,71,111,0.5)); transition:transform 0.15s;
        }
        .wheel-pointer.bouncing {
            animation:pointerBounce 0.12s ease-in-out infinite alternate;
        }
        @keyframes pointerBounce {
            from { transform:translateX(-50%) translateY(0); }
            to   { transform:translateX(-50%) translateY(4px); }
        }
        canvas#wheelCanvas {
            width:100%; height:100%; border-radius:50%;
            box-shadow:0 8px 40px rgba(255,107,53,0.18), 0 0 0 8px #FFF, 0 0 0 12px #F5EDE5;
        }

        .center-btn {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10;
            width:72px; height:72px; border-radius:50%; border:none;
            background:linear-gradient(135deg, #FFF, #FFF5EE);
            box-shadow:0 4px 18px rgba(0,0,0,0.12), inset 0 1px 0 #fff;
            font-size:16px; font-weight:800; color:var(--primary);
            cursor:pointer; font-family:var(--font); letter-spacing:2px;
            transition:all 0.25s;
        }
        .center-btn:hover { transform:translate(-50%,-50%) scale(1.08); box-shadow:0 6px 24px rgba(255,107,53,0.3), inset 0 1px 0 #fff; }
        .center-btn:active { transform:translate(-50%,-50%) scale(0.94); }
        .center-btn:disabled { opacity:0.45; cursor:not-allowed; pointer-events:none; }

        /* ── Result Cards ── */
        .result-card {
            width:100%; background:var(--card); border-radius:var(--radius); padding:18px 20px;
            box-shadow:var(--shadow); border:1.5px solid var(--border); text-align:center;
            transition:all 0.4s;
        }
        .result-card .result-label { font-size:12px; color:var(--text-light); letter-spacing:2px; margin-bottom:4px; }
        .result-card .result-value { font-size:22px; font-weight:700; color:var(--primary); letter-spacing:1px; line-height:1.6; }
        .result-card .result-detail { font-size:13px; color:var(--text-light); margin-top:4px; }

        .final-card {
            width:100%; background:linear-gradient(135deg, #FFF5EE, #FFF9F2, #FFF);
            border-radius:var(--radius); padding:26px 20px;
            box-shadow:0 8px 32px rgba(255,107,53,0.2); border:2px solid var(--accent);
            text-align:center; animation:finalPopIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes finalPopIn {
            0% { transform:scale(0.7); opacity:0; }
            100% { transform:scale(1); opacity:1; }
        }
        .final-card .final-emoji { font-size:48px; margin-bottom:8px; animation:emojiBounce 0.6s ease-in-out infinite alternate; }
        @keyframes emojiBounce {
            from { transform:translateY(0) scale(1); }
            to   { transform:translateY(-10px) scale(1.1); }
        }
        .final-card .final-text { font-size:20px; font-weight:700; color:var(--text); line-height:1.8; }
        .final-card .final-text .shop-name {
            color:var(--warm-red); font-size:24px; display:inline-block;
            animation:namePulse 1.5s ease-in-out infinite;
        }
        @keyframes namePulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.06); }
        }
        .final-card .final-detail { font-size:13px; color:var(--text-light); margin-top:6px; }

        /* ── Buttons ── */
        .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
        .btn {
            border:none; padding:10px 24px; border-radius:25px; font-size:15px;
            font-weight:700; cursor:pointer; font-family:var(--font); letter-spacing:1px; transition:all 0.25s;
        }
        .btn-primary { background:linear-gradient(135deg, var(--primary), var(--secondary)); color:#fff; box-shadow:0 4px 16px rgba(255,107,53,0.3); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(255,107,53,0.45); }
        .btn-primary:disabled { opacity:0.45; cursor:not-allowed; pointer-events:none; transform:none; }
        .btn-outline { background:#fff; color:var(--primary); border:2px solid var(--primary); }
        .btn-outline:hover { background:#FFF5EE; }
        .btn-back {
            background:#FFF; color:var(--text-light); border:2px solid #E8DDD2;
            font-size:13px; padding:8px 18px;
        }
        .btn-back:hover { border-color:var(--secondary); color:var(--primary); }

        /* ── Celebration ── */
        .celebrate-overlay { position:fixed; inset:0; z-index:999; pointer-events:none; display:none; }
        .celebrate-overlay.show { display:block; }
        .confetti-piece {
            position:absolute; border-radius:3px;
            animation:confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { transform:translateY(-120vh) rotate(0deg); opacity:1; }
            80%  { opacity:1; }
            100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
        }

        /* ── Toast ── */
        .toast {
            position:fixed; top:24px; left:50%;
            transform:translateX(-50%) translateY(-120px);
            background:#4A3728; color:#FFD166; padding:10px 20px;
            border-radius:25px; font-size:14px; font-weight:600;
            font-family:var(--font); letter-spacing:1px; z-index:1000;
            transition:transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            pointer-events:none;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }

        /* ── Responsive ── */
        @media (max-width:400px) {
            .wheel-container { width:280px; height:280px; }
            .center-btn { width:60px; height:60px; font-size:14px; }
            .header h1 { font-size:24px; }
            .pick-title { font-size:19px; }
            .cat-chip .chip-label { padding:8px 14px; font-size:13px; }
            .final-card .final-text { font-size:17px; }
            .final-card .final-text .shop-name { font-size:20px; }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <h1>🍳 干饭抽签转盘</h1>
        <div class="subtitle">— 专治"今天吃啥"选择困难症 —</div>
    </div>

    <!-- Location Bar (always visible) -->
    <div class="location-bar" id="locationBar">
        <span class="loc-icon">📍</span>
        <span class="loc-text" id="locDisplay">正在获取位置...</span>
        <input class="loc-input" id="locInput" type="text" placeholder="输入地址，如：绵竹市回澜大道"
               style="display:none;" maxlength="50">
        <button class="loc-edit-hint" id="locEditBtn">[修改]</button>
        <button class="loc-btn" id="locSaveBtn" style="display:none;">[保存]</button>
    </div>

    <!-- ════════════ Step 1: 品类挑选页 ════════════ -->
    <div id="step1">
        <div class="pick-title">🤔 今天想吃点啥？</div>
        <div class="pick-subtitle">勾选 1~5 个你想吃的品类，或自定义添加</div>

        <div class="pick-card">
            <div class="cat-grid" id="categoryGrid"></div>
            <div class="custom-row">
                <span class="custom-icon">➕</span>
                <input type="text" id="customInput" placeholder="如：螺蛳粉、披萨…" maxlength="10">
                <button class="btn-add-custom" id="btnAddCustom">添加</button>
            </div>
        </div>

        <div class="pick-footer">
            <div class="pick-counter" id="pickCounter">已选 0/5 个品类</div>
            <button class="btn-generate" id="btnGenerate" disabled>🎰 生成干饭转盘</button>
        </div>
    </div>

    <!-- ════════════ Step 2: 转盘抽签页 ════════════ -->
    <div id="step2">
        <button class="btn btn-back" id="btnBackToPick">⬅ 重新选品类</button>

        <div class="stage-indicator" id="stageIndicator">
            <div class="stage-dot active" id="dot1">1</div>
            <div class="stage-line" id="line1"></div>
            <div class="stage-dot" id="dot2">2</div>
        </div>

        <div class="wheel-container" id="wheelContainer">
            <div class="wheel-pointer" id="wheelPointer"></div>
            <canvas id="wheelCanvas" width="680" height="680"></canvas>
            <button class="center-btn" id="centerBtn">开转</button>
        </div>

        <div class="result-card" id="resultCard" style="display:none;">
            <div class="result-label" id="resultLabel"></div>
            <div class="result-value" id="resultValue"></div>
            <div class="result-detail" id="resultDetail"></div>
        </div>

        <div class="final-card" id="finalCard" style="display:none;">
            <div class="final-emoji">🎉</div>
            <div class="final-text">今天就决定去<br><span class="shop-name" id="finalShopName"></span><br>干饭啦！</div>
            <div class="final-detail" id="finalDetail"></div>
        </div>

        <div class="actions" id="actionsArea" style="display:none;">
            <button class="btn btn-outline" id="btnRespin">🔄 重新转</button>
            <button class="btn btn-primary" id="btnNext">🔍 搜周边 ➤</button>
        </div>
    </div>
</div>

<!-- Celebration Overlay -->
<div class="celebrate-overlay" id="celebrateOverlay"></div>
<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
'use strict';

// ╔══════════════════════════════════════════════════════╗
// ║  干饭抽签转盘 · 两步分离 · 自定义品类 · 全真实数据  ║
// ╚══════════════════════════════════════════════════════╝

// ──── 内置品类 ────
const BUILTIN_CATEGORIES = [
    { name: '火锅', code: '050400', emoji: '🍲' },
    { name: '烧烤', code: '050500', emoji: '🍖' },
    { name: '川菜', code: '050101', emoji: '🌶️' },
    { name: '日料', code: '050104', emoji: '🍣' },
    { name: '韩料', code: '050105', emoji: '🥩' },
    { name: '西餐', code: '050107', emoji: '🍝' },
    { name: '快餐', code: '050300', emoji: '🍔' },
    { name: '小吃', code: '050600', emoji: '🍢' },
    { name: '面馆', code: '050202', emoji: '🍜' },
    { name: '粤菜', code: '050103', emoji: '🥘' },
];

const SEGMENT_COLORS = [
    '#FF6B6B','#FF8E72','#FFA94D','#FFD43B','#FF922B',
    '#F76707','#E8590C','#FD7E14','#F08C00','#FF8787',
];

// ──── 全局状态 ────
const state = {
    location: null,
    locationText: '',
    locationCity: '',
    customCategories: [],       // [{ name, emoji:'✨', code:null, isCustom:true }]
    activeCategories: [],       // 当前勾选的品类列表（用于生成转盘）
    selectedCategory: null,     // Stage 1 结果
    restaurants: [],
    selectedRestaurant: null,   // Stage 2 结果（终点）
    isSpinning: false,
    wheelData: [],
    stage: 1,                   // 1=品类转盘, 2=店铺转盘（step2 内部阶段）
    locationReady: false,       // 定位是否已完成（无论成功/失败）
};

// ★★★ 顶级全局坐标锁：Step 1/2 切换生命周期内永不清空 ★★★
window.currentLocation = null;  // { lng, lat } | null

// ──── DOM ────
const $ = (s) => document.querySelector(s);
const dom = {
    step1: $('#step1'),
    step2: $('#step2'),
    categoryGrid: $('#categoryGrid'),
    customInput: $('#customInput'),
    btnAddCustom: $('#btnAddCustom'),
    pickCounter: $('#pickCounter'),
    btnGenerate: $('#btnGenerate'),
    btnBackToPick: $('#btnBackToPick'),

    canvas: $('#wheelCanvas'),
    ctx: $('#wheelCanvas').getContext('2d'),
    pointer: $('#wheelPointer'),
    centerBtn: $('#centerBtn'),

    resultCard: $('#resultCard'),
    resultLabel: $('#resultLabel'),
    resultValue: $('#resultValue'),
    resultDetail: $('#resultDetail'),
    finalCard: $('#finalCard'),
    finalShopName: $('#finalShopName'),
    finalDetail: $('#finalDetail'),
    actionsArea: $('#actionsArea'),
    btnRespin: $('#btnRespin'),
    btnNext: $('#btnNext'),

    locDisplay: $('#locDisplay'),
    locInput: $('#locInput'),
    locEditBtn: $('#locEditBtn'),
    locSaveBtn: $('#locSaveBtn'),

    celebrateOverlay: $('#celebrateOverlay'),
    toast: $('#toast'),
    dot1: $('#dot1'), dot2: $('#dot2'), line1: $('#line1'),
    stageIndicator: $('#stageIndicator'),
};

// ──── 工具 ────
let _toastT = null;
function toast(msg, dur) {
    dom.toast.textContent = msg;
    dom.toast.classList.add('show');
    clearTimeout(_toastT);
    if (dur !== Infinity) _toastT = setTimeout(() => dom.toast.classList.remove('show'), dur || 2000);
}
function hideToast() { dom.toast.classList.remove('show'); clearTimeout(_toastT); }

function amapOk() { return typeof AMap !== 'undefined' && AMap && typeof AMap.plugin === 'function'; }

// ──── 定位模块（不变）────
function locateNative() {
    return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        const t = setTimeout(() => resolve(null), 5000);
        navigator.geolocation.getCurrentPosition(
            (p) => { clearTimeout(t); resolve({ lng: p.coords.longitude, lat: p.coords.latitude }); },
            ()   => { clearTimeout(t); resolve(null); },
            { enableHighAccuracy: false, timeout: 5000, maximumAge: 600000 }
        );
    });
}
function reverseGeocode(lng, lat) {
    return new Promise((resolve) => {
        if (!amapOk()) return resolve(null);
        AMap.plugin('AMap.Geocoder', function() {
            new AMap.Geocoder().getAddress([lng, lat], function(status, result) {
                if (status === 'complete' && result.info === 'OK' && result.regeocode) {
                    const c = result.regeocode.addressComponent;
                    let txt = '';
                    if (c.neighborhood && c.neighborhood.trim()) txt = c.neighborhood.trim();
                    else if (c.building && c.building.trim()) txt = c.building.trim();
                    else if (c.street && c.street.trim()) txt = c.street.trim() + (c.streetNumber||'') + '附近';
                    else txt = result.regeocode.formattedAddress || '';
                    if (txt.length > 18) txt = txt.substring(0,18) + '…';
                    resolve({ text: txt, full: result.regeocode.formattedAddress, city: c.city || '' });
                } else resolve(null);
            });
        });
    });
}
function locateByIP() {
    return new Promise((resolve) => {
        if (!amapOk()) return resolve(null);
        AMap.plugin('AMap.CitySearch', function() {
            new AMap.CitySearch().getLocalCity(function(status, result) {
                if (status === 'complete' && result && result.city) resolve({ city: result.city, province: result.province });
                else resolve(null);
            });
        });
    });
}
function geocodeAddress(addr) {
    return new Promise((resolve) => {
        if (!amapOk()) return resolve(null);
        AMap.plugin('AMap.Geocoder', function() {
            new AMap.Geocoder({ city: state.locationCity || '全国' }).getLocation(addr, function(status, result) {
                if (status === 'complete' && result.info === 'OK' && result.geocodes.length > 0) {
                    const g = result.geocodes[0];
                    resolve({ lng: g.location.lng, lat: g.location.lat, formattedAddress: g.formattedAddress || addr, city: g.city || g.addressComponent?.city || state.locationCity });
                } else resolve(null);
            });
        });
    });
}
async function initLocation() {
    dom.locDisplay.textContent = '正在获取位置...';
    const nc = await locateNative();
    if (nc) {
        state.location = { lng: nc.lng, lat: nc.lat };
        window.currentLocation = { lng: nc.lng, lat: nc.lat }; // ★ 锁死全局坐标
        const rev = await reverseGeocode(nc.lng, nc.lat);
        state.locationText = rev ? (rev.text || rev.full) : '已获取精准定位';
        state.locationCity = rev ? (rev.city || '') : '';
        dom.locDisplay.textContent = state.locationText;
        state.locationReady = true;
        return;
    }
    const ip = await locateByIP();
    if (ip && ip.city) {
        state.locationCity = ip.city; state.locationText = ip.city;
        dom.locDisplay.textContent = ip.city;
        state.locationReady = true;
        return;
    }
    state.locationCity = ''; state.locationText = ''; dom.locDisplay.textContent = '点击 [修改] 输入你的位置';
    state.locationReady = true; // 即使失败也算完成，让用户手动输入
}
async function handleManualSave() {
    const raw = dom.locInput.value.trim();
    if (!raw) { toast('😅 请输入地址后再保存哦'); return; }
    dom.locDisplay.style.display = 'block'; dom.locInput.style.display = 'none';
    dom.locEditBtn.style.display = 'inline-block'; dom.locSaveBtn.style.display = 'none';
    dom.locDisplay.textContent = '正在查询…';
    const geo = await geocodeAddress(raw);
    if (geo) {
        state.location = { lng: geo.lng, lat: geo.lat };
        window.currentLocation = { lng: geo.lng, lat: geo.lat }; // ★ 锁死全局坐标
        state.locationText = geo.formattedAddress || raw;
        state.locationCity = geo.city || state.locationCity;
        dom.locDisplay.textContent = state.locationText;
        state.locationReady = true;
        toast('✅ 位置已更新！');
    } else {
        state.locationText = raw; state.locationCity = raw;
        dom.locDisplay.textContent = raw;
        state.locationReady = true;
        toast('⚠️ 无法解析该地址，将以文字形式搜索');
    }
}

/** 获取所有可选品类（内置 + 自定义）*/
function getAllCategories() {
    return [...BUILTIN_CATEGORIES, ...state.customCategories];
}

/** 获取当前勾选的品类列表 */
function getCheckedCategories() {
    const all = getAllCategories();
    const cbs = dom.categoryGrid.querySelectorAll('input[type="checkbox"]');
    const checked = [];
    cbs.forEach((cb) => {
        if (cb.checked) {
            const idx = parseInt(cb.dataset.index);
            if (idx >= 0 && idx < all.length) checked.push(all[idx]);
        }
    });
    return checked;
}

/** 更新计数器 + 按钮状态 */
function updatePickUI() {
    const checked = getCheckedCategories();
    const n = checked.length;
    dom.pickCounter.textContent = '已选 ' + n + '/5 个品类';
    dom.pickCounter.classList.toggle('warn', n < 1 || n > 5);
    const valid = n >= 1 && n <= 5;
    dom.btnGenerate.disabled = !valid;
    dom.btnGenerate.textContent = valid ? '🎰 生成干饭转盘' : (n === 0 ? '👆 先勾选想吃的品类' : '⚠️ 最多选 5 个');
}

/** 渲染品类网格（全量重建）*/
function renderCategoryGrid() {
    const all = getAllCategories();
    // 记录当前勾选状态
    const oldChecked = {};
    dom.categoryGrid.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
        oldChecked[cb.dataset.key] = cb.checked;
    });

    dom.categoryGrid.innerHTML = '';
    all.forEach((cat, i) => {
        const key = cat.isCustom ? ('custom_' + cat.name) : ('builtin_' + i);
        const wasChecked = oldChecked[key] !== undefined ? oldChecked[key] : false;

        const chip = document.createElement('label');
        chip.className = 'cat-chip' + (cat.isCustom ? ' custom' : '');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.dataset.index = i;
        cb.dataset.key = key;
        cb.checked = wasChecked;
        cb.addEventListener('change', updatePickUI);
        const span = document.createElement('span');
        span.className = 'chip-label';
        span.textContent = (cat.emoji || '✨') + ' ' + cat.name;
        chip.appendChild(cb);
        chip.appendChild(span);

        // 自定义品类：删除按钮
        if (cat.isCustom) {
            const del = document.createElement('button');
            del.className = 'chip-del';
            del.textContent = '×';
            del.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                removeCustomCategory(i);
            });
            chip.appendChild(del);
        }

        dom.categoryGrid.appendChild(chip);
    });
    updatePickUI();
}

/** 添加自定义品类 */
function addCustomCategory() {
    const raw = dom.customInput.value.trim();
    if (!raw) { toast('😅 请输入品类名称'); return; }
    // 去重
    const all = getAllCategories();
    if (all.some((c) => c.name === raw)) { toast('😅 「' + raw + '」已经存在啦'); return; }
    // 检查当前勾选数
    const curChecked = getCheckedCategories().length;
    if (curChecked >= 5) { toast('⚠️ 已选满 5 个，请先取消一些再添加'); return; }

    state.customCategories.push({ name: raw, emoji: '✨', code: null, isCustom: true });
    dom.customInput.value = '';
    renderCategoryGrid();
    // 新添加的自定义品类默认勾选
    const lastCb = dom.categoryGrid.querySelectorAll('input[type="checkbox"]');
    const last = lastCb[lastCb.length - 1];
    if (last) { last.checked = true; updatePickUI(); }
    toast('✅ 已添加「' + raw + '」');
}

/** 删除自定义品类 */
function removeCustomCategory(globalIndex) {
    const all = getAllCategories();
    const cat = all[globalIndex];
    if (!cat || !cat.isCustom) return;
    state.customCategories = state.customCategories.filter((c) => c.name !== cat.name);
    renderCategoryGrid();
    toast('🗑️ 已移除「' + cat.name + '」');
}

/** 「生成干饭转盘」→ 进入 Step 2 */
function enterStep2() {
    const checked = getCheckedCategories();
    if (checked.length < 1 || checked.length > 5) return;

    // ★ 安全拦截：坐标未就绪则阻断
    if (!state.locationReady) {
        toast('📡 正在努力精准定位中，请稍等一秒哦～', 2500);
        return;
    }

    state.activeCategories = [...checked];

    // 切页动画
    dom.step1.classList.add('hiding');
    setTimeout(() => {
        dom.step1.style.display = 'none';
        dom.step1.classList.remove('hiding');
        dom.step2.style.display = 'flex';
        initStep2();
    }, 280);
}

/** 「重新选品类」→ 回到 Step 1 */
function backToStep1() {
    if (state.isSpinning) return;
    dom.step2.classList.add('hiding');
    setTimeout(() => {
        dom.step2.style.display = 'none';
        dom.step2.classList.remove('hiding');
        dom.step1.style.display = 'flex';
        updatePickUI();
    }, 280);
}

    [dom.dot1, dom.dot2].forEach((d, i) => {
        d.classList.remove('active', 'done');
        if (i + 1 < stage) d.classList.add('done');
        if (i + 1 === stage) d.classList.add('active');

function hideStep2Results() {

    state.selectedCategory = null;
    state.selectedRestaurant = null;
    state.restaurants = [];

/** 转盘绘制 */
const CS = 680, CX = CS / 2, CY = CS / 2, R_OUT = 310, R_IN = 200;
function drawWheel(data, rotation) {
    rotation = rotation || 0;
    const ctx = dom.ctx;
    ctx.clearRect(0, 0, CS, CS);
    const N = data.length;
    if (N === 0) return;
    const seg = (2 * Math.PI) / N;
    for (let i = 0; i < N; i++) {
        const a0 = rotation + i * seg, a1 = a0 + seg;
        ctx.beginPath(); ctx.moveTo(CX, CY); ctx.arc(CX, CY, R_OUT, a0, a1); ctx.closePath();
        ctx.fillStyle = SEGMENT_COLORS[i % SEGMENT_COLORS.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();

        const mid = a0 + seg / 2;
        const tr = R_IN + (R_OUT - R_IN) * 0.5;
        const tx = CX + tr * Math.cos(mid), ty = CY + tr * Math.sin(mid);
        ctx.save(); ctx.translate(tx, ty); ctx.rotate(mid + Math.PI / 2);
        const item = data[i];
        let text = (item.emoji || '') + ' ' + (item.label || item.name || '');
        const fs = N <= 4 ? 20 : (N <= 6 ? 18 : 13);
        ctx.font = 'bold ' + fs + 'px "' + getComputedStyle(document.body).fontFamily + '"';
        ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 3;
        const maxW = seg * tr * 0.78;
        if (ctx.measureText(text).width > maxW && N >= 4) {
            text = item.label || item.name || '';
            if (ctx.measureText(text).width > maxW) text = text.substring(0, 4);
        }
        ctx.fillText(text, 0, 0);
        ctx.restore();
    }
    ctx.beginPath(); ctx.arc(CX, CY, R_OUT + 3, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 3; ctx.stroke();
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 70);
    grad.addColorStop(0, '#FFF'); grad.addColorStop(1, '#FFF5EE');
    ctx.beginPath(); ctx.arc(CX, CY, 70, 0, 2 * Math.PI);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 2; ctx.stroke();
}

/** 转盘动画 */
function spinWheel(data, winnerIdx) {
    return new Promise((resolve) => {
        if (state.isSpinning) return resolve();
        state.isSpinning = true;
        dom.centerBtn.disabled = true; dom.centerBtn.textContent = '...';
        dom.pointer.classList.add('bouncing');
        const N = data.length;
        const seg = (2 * Math.PI) / N;
        const base = ((1.5 * Math.PI - (winnerIdx + 0.5) * seg) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
        const full = (6 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
        const target = full + base;
        const dur = 4000 + Math.random() * 1000;
        const t0 = performance.now();
        function anim(now) {
            const p = Math.min((now - t0) / dur, 1);
            drawWheel(data, target * (1 - Math.pow(1 - p, 3)));
            if (p < 1) requestAnimationFrame(anim);
            else {
                state.isSpinning = false;
                dom.centerBtn.disabled = false; dom.centerBtn.textContent = '开转';
                dom.pointer.classList.remove('bouncing');
                drawWheel(data, base);
                resolve();
            }
        }
        requestAnimationFrame(anim);
    });
}

/** Stage 1 转品类 */
async function spinStage1() {
    if (state.isSpinning) return;
    const N = state.wheelData.length;
    const wi = Math.floor(Math.random() * N);
    await spinWheel(state.wheelData, wi);
    const winner = state.wheelData[wi];
    state.selectedCategory = winner.catObj;
    dom.resultCard.style.display = 'block';
    dom.finalCard.style.display = 'none';
    dom.resultLabel.textContent = '🎯 抽中品类';
    dom.resultValue.textContent = (winner.emoji || '') + ' ' + winner.label;
    dom.resultDetail.textContent = '点击「搜周边」查找附近真实店铺！';
    dom.actionsArea.style.display = 'flex';
    dom.btnNext.textContent = '🔍 搜周边 ➤';
    dom.btnNext.style.display = 'inline-block';
    dom.btnNext.onclick = goToStage2;
    dom.btnRespin.onclick = initStep2;
}

// ═══════════════════════════════════════════
//  搜索模块（空间降级，支持自定义品类无编码搜索）
// ═══════════════════════════════════════════

function searchNearbyOnce(keyword, typeCode, radiusMeters) {
    return new Promise((resolve) => {
        if (!amapOk()) { resolve([]); return; }
        AMap.plugin('AMap.PlaceSearch', function() {
            const opts = { pageSize: 25, pageIndex: 1, city: state.locationCity || undefined, citylimit: false };
            // ★ 仅当明确传入 typeCode 时才启用分类过滤（第一级精准搜索）
            if (typeCode) opts.type = typeCode;
            const ps = new AMap.PlaceSearch(opts);

            // ★ 三级坐标取值：全局锁 → state → 城市名兜底
            const loc = window.currentLocation || state.location;
            const center = (loc && loc.lng)
                ? [loc.lng, loc.lat]
                : (state.locationCity || '成都');

            const cb = function(status, result) {
                if (status === 'complete' && result && result.poiList && result.poiList.pois.length > 0) {
                    const pois = result.poiList.pois.map((p) => ({
                        name: p.name || '未知店名',
                        address: p.address || '',
                        distanceRaw: typeof p.distance === 'number' ? p.distance : 999999,
                        distance: formatDist(p.distance),
                    }));
                    pois.sort((a, b) => a.distanceRaw - b.distanceRaw);
                    resolve(pois.slice(0, 5));
                } else resolve([]);
            };

            if (loc && loc.lng) {
                ps.searchNearBy(keyword || '', center, radiusMeters, cb);
            } else {
                ps.search(keyword || '', cb);
            }
        });
    });
}
function formatDist(m) {
    if (m === undefined || m === null) return '';
    return m < 1000 ? Math.round(m) + 'm' : (m / 1000).toFixed(1) + 'km';
}

/** ★ 空间降级 + 关键字模糊化：5km精准 → 10km纯文本 → 20km纯文本，品类绝不变 */
async function searchWithSpatialFallback(cat) {
    const kw = cat.name;
    const tc = cat.code || null; // 自定义品类无编码

    // ★ 获取权威坐标
    const loc = window.currentLocation || state.location;

    if (loc && loc.lng) {
        // ─── 第 1 级：5km + 品类编码（精准出击）───
        toast('🔍 正在搜索 5km 内的「' + kw + '」（精准匹配）…', Infinity);
        let r = await searchNearbyOnce(kw, tc, 5000);
        if (r.length > 0) { hideToast(); return r; }

        // ─── 第 2 级：10km + 纯文本（去掉编码，模糊搜索）───
        toast('🔍 5km 未找到，扩大至 10km 模糊搜索「' + kw + '」…', Infinity);
        r = await searchNearbyOnce(kw, null, 10000);
        if (r.length > 0) { hideToast(); return r; }

        // ─── 第 3 级：20km 全城 + 纯文本（终极兜底）───
        toast('🔍 10km 未找到，扩大至 20km 全城搜索「' + kw + '」…', Infinity);
        r = await searchNearbyOnce(kw, null, 20000);
        hideToast();
        return r.length > 0 ? r : null;
    } else {
        // 无精准坐标：纯文本城市搜索
        toast('🔍 正在全城搜索「' + kw + '」…', Infinity);
        const r = await searchNearbyOnce(kw, null, 0);
        hideToast();
        return r.length > 0 ? r : null;
    }
}

// ═══════════════════════════════════════════
//  Stage 2 搜索 → 转店铺 → 终点
// ═══════════════════════════════════════════

async function goToStage2() {
    if (!state.selectedCategory) { toast('😅 先转转盘抽个品类吧'); return; }
    if (state.isSpinning) return;
    state.stage = 2;
    updateStageUI(2);
    hideStep2Results();
    dom.centerBtn.disabled = true; dom.centerBtn.textContent = '...';
    drawWheel([{ label: '搜索中', emoji: '🔍' }], 0);

    const restaurants = await searchWithSpatialFallback(state.selectedCategory);
    if (!restaurants || restaurants.length === 0) {
        toast('😔 您附近及全城实在没有「' + state.selectedCategory.name + '」店铺，建议换个口味重转哦～', 4000);
        dom.centerBtn.disabled = false; dom.centerBtn.textContent = '开转';
        initStep2();
        return;
    }
    state.restaurants = restaurants;
    state.wheelData = restaurants.map((r) => ({
        label: r.name, emoji: '🏪', address: r.address, distance: r.distance, distanceRaw: r.distanceRaw,
    }));
    drawWheel(state.wheelData, 0);
    dom.centerBtn.disabled = false; dom.centerBtn.textContent = '开转';
    dom.centerBtn.onclick = spinStage2;
    dom.btnNext.style.display = 'none';
    toast('✅ 在周边找到 ' + restaurants.length + ' 家真实「' + state.selectedCategory.name + '」店铺！');
}

async function spinStage2() {
    if (state.isSpinning) return;
    const N = state.wheelData.length;
    const wi = Math.floor(Math.random() * N);
    await spinWheel(state.wheelData, wi);
    const winner = state.restaurants[wi];
    state.selectedRestaurant = winner;
    celebrate();
    dom.resultCard.style.display = 'none';
    dom.finalCard.style.display = 'block';
    dom.finalShopName.textContent = winner.name + '（' + winner.distance + '）';
    dom.finalDetail.textContent = '📍 ' + (winner.address || '真实街边店铺');
    dom.actionsArea.style.display = 'flex';
    dom.btnNext.textContent = '🔄 再来一轮';
    dom.btnNext.style.display = 'inline-block';
    dom.btnNext.onclick = initStep2;
    dom.btnRespin.onclick = goToStage2;
}

// ──── 撒花 ────
function celebrate() {
    const ov = dom.celebrateOverlay;
    ov.innerHTML = ''; ov.classList.add('show');
    const colors = ['#FF6B6B','#FFD166','#FF8C42','#EF476F','#06D6A0','#118AB2','#FF6B35','#F76707','#FFD43B','#FF922B','#E8590C','#F03E3E','#FD7E14','#FF8787','#F08C00'];
    for (let i = 0; i < 90; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = -(Math.random() * 60 + 10) + 'px';
        el.style.width = (Math.random() * 8 + 6) + 'px';
        el.style.height = (Math.random() * 8 + 6) + 'px';
        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
        el.style.animationDelay = Math.random() * 1.5 + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        ov.appendChild(el);
    }
    setTimeout(() => { ov.classList.remove('show'); ov.innerHTML = ''; }, 4200);
}

dom.btnBackToPick.addEventListener('click', backToStep1);
dom.btnAddCustom.addEventListener('click', addCustomCategory);
dom.customInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addCustomCategory(); });
dom.locEditBtn.addEventListener('click', () => {
    dom.locDisplay.style.display = 'none'; dom.locEditBtn.style.display = 'none';
    dom.locInput.style.display = 'block'; dom.locInput.value = state.locationText || '';
    dom.locSaveBtn.style.display = 'inline-block'; dom.locInput.focus();
});
dom.locSaveBtn.addEventListener('click', handleManualSave);
dom.locInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleManualSave(); });

// ──── 启动 ────
async function boot() {
    console.log('🍳 干饭抽签转盘启动…');
    if (!amapOk()) toast('⚠️ 地图服务未加载，请手动输入位置后使用', 4000);
    renderCategoryGrid();
    await initLocation();
    // 默认显示 Step 1
    dom.step1.style.display = 'flex';
    dom.step2.style.display = 'none';
    if (!state.location && !state.locationText) {
        setTimeout(() => toast('💡 点击顶部 [修改] 输入地址，就能搜真实周边美食啦！', 4000), 1500);
    }
    console.log('[启动] 就绪 | 位置:', state.locationText, '| 坐标:', state.location);
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();

})();
</script>
</body>
</html>
